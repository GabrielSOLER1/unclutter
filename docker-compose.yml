services:
  unclutter:
    build: .
    container_name: unclutter
    ports:
      - "3000:3000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=3000
    env_file:
      - .env
    volumes:
      - unclutter_data:/app/data
    restart: unless-stopped

volumes:
  unclutter_data:
